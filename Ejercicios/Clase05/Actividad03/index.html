<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería de recursos del curso</title>
</head>
<body>
  <header>
    <h1>Galería de recursos del curso</h1>
    <p>Recursos multimedia seleccionados para apoyar el aprendizaje en línea.</p>
  </header>

  <hr>

  <main>
    <section>
      <h2>Imagen principal</h2>
      <figure>
        <picture>
          <source srcset="imagenes/curso-principal.webp" type="image/webp">
          <img src="imagenes/curso-principal.jpg" alt="Imagen principal del curso: portada con estudiantes y materiales educativos" title="Portada del curso - Recursos y materiales educativos" width="800" height="450">
        </picture>
        <figcaption>Imagen principal del curso (AVIF, WebP y JPEG).</figcaption>
      </figure>
    </section>

    <hr>

    <section>
      <h2>Video de introducción</h2>
      <figure>
        <video controls poster="imagenes/poster-video.jpg" width="640" height="360" title="Video de introducción al curso">
          <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm" type="video/webm">
          <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
          Su navegador no puede reproducir este video. Descargue el archivo para verlo.
        </video>
        <figcaption>Video de introducción (WebM y MP4).</figcaption>
      </figure>
    </section>

    <hr>

    <section>
      <h2>Audio de la clase</h2>
      <figure>
        <audio controls preload="metadata" title="Podcast de la clase">
          <source src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Example.ogg" type="audio/ogg">
          <source src="https://interactive-examples.mdn.mozilla.net/media/examples/t-rex-roar.mp3" type="audio/mpeg">
          Su navegador no puede reproducir este audio. Descargue el archivo para escucharlo.
        </audio>
        <figcaption>Audio del podcast de la clase (OGG y MP3).</figcaption>
      </figure>
    </section>

    <hr>

    <section>
      <h2>Ubicación (Google Maps)</h2>
      <figure>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.019260789634!2d-122.08424968468118!3d37.421999779825135!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808fb0b5c8b4b4d1%3A0x2b2b8b0c0f4c4d1f!2sGoogleplex!5e0!3m2!1ses-419!2sus!4v1610000000000!5m2!1ses-419!2sus" width="600" height="450" title="Mapa del campus y sede del curso" loading="lazy" referrerpolicy="no-referrer-when-downgrade" allowfullscreen sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
        <figcaption>Mapa embebido de la ubicación relacionada con el curso.</figcaption>
      </figure>
    </section>

  </main>

  <hr>

  <footer>
    <p>Galería creada con HTML puro.</p>
  </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout Flexbox</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: #222;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-weight: bold;
      font-size: 22px;
    }

    .links {
      display: flex;
      gap: 20px;
    }

    .links a {
      color: white;
      text-decoration: none;
    }

    .cta {
      background: #00b894;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
    }

    .wrapper {
      flex: 1;
      display: flex;
      gap: 15px;
      padding: 20px;
    }

    .sidebar {
      flex: 1;
      background: #dfe6e9;
      padding: 20px;
    }

    .contenido {
      flex: 3;
      background: white;
      padding: 20px;
    }

    .panel {
      flex: 1;
      background: #dfe6e9;
      padding: 20px;
    }

    .footer {
      display: flex;
      gap: 15px;
      background: #222;
      color: white;
      padding: 20px;
    }

    .footer div {
      flex: 1;
      background: #333;
      padding: 15px;
      text-align: center;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo">Mi Logo</div>

    <div class="links">
      <a href="#">Inicio</a>
      <a href="#">Servicios</a>
      <a href="#">Contacto</a>
    </div>

    <button class="cta">Botón CTA</button>
  </nav>

  <main class="wrapper">
    <aside class="sidebar">
      <h2>Sidebar</h2>
      <p>Esta parte usa flex: 1.</p>
    </aside>

    <section class="contenido">
      <h1>Contenido principal</h1>
      <p>Esta parte usa flex: 3, por eso ocupa más espacio.</p>
    </section>

    <aside class="panel">
      <h2>Panel</h2>
      <p>Esta parte también usa flex: 1.</p>
    </aside>
  </main>

  <footer class="footer">
    <div>Columna 1</div>
    <div>Columna 2</div>
    <div>Columna 3</div>
  </footer>

</body>
</html>
